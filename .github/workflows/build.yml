name: Build and Publish Native Addon

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build

      - name: Run tests
        run: node test.js

  prebuild-and-publish:
    runs-on: windows-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')

    environment: NPM

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build prebuild for Electron 41 x64
        run: npm run prebuild:electron

      - name: Upload prebuild to release
        uses: softprops/action-gh-release@v1
        with:
          files: prebuilds/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (includes prebuilds)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
